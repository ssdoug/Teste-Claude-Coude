name = "ai-backend"
main = "src/entry.py"
compatibility_date = "2026-07-19"
compatibility_flags = ["python_workers"]

# Rota same-origin em produção (evita CORS).
routes = [
  { pattern = "toolboxai.com.br/api/*", zone_name = "toolboxai.com.br" }
]

# Sem entrada lateral: a única porta de entrada é a rota acima. O wrangler já
# desativa isso por padrão ao existir `routes`, mas deixamos explícito.
workers_dev = false
preview_urls = false

[observability]
enabled = true

# D1 — logs de prompts (SQLite na borda).
# Crie com `npx wrangler d1 create ai-logs` e cole o ID gerado abaixo:
# [[d1_databases]]
# binding = "DB"
# database_name = "ai-logs"
# database_id = "<preencha-com-o-id-do-d1>"

# KV — cache de respostas / contadores de rate-limit.
# Crie com `npx wrangler kv namespace create KV` e cole o ID gerado abaixo:
# [[kv_namespaces]]
# binding = "KV"
# id = "<preencha-com-o-id-do-kv>"
